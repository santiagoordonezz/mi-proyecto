<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">
    <title>Tabla de operadores</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
 
    <h1>Tabla de operadores</h1>

<table>
    <tr>
        <th>Operador</th>
    <th>Tipo</th>
<th>Descripcion</th>
    </tr>

    <tr>
        <td>==</td>
        <td>Comparacion</td>
        <td>Igual a</td>
    </tr>

<tr>
    <td>></td>
    <td>Comparacion</td>
    <td>Mayor que</td>
</tr>

<tr>
    <td><</td>
    <td>Comparacion</td>
    <td>Menor que</td>
</tr>

<tr>
    <td>>=</td>
    <td>Comparacion</td>
    <td>Mayor o igual</td>
</tr>

<tr>
    <td><=</td>
    <td>Comparacion</td>
    <td>Menor o igual</td>
</tr>

<tr>
    <td>AND</td>
    <td>Logico</td>
    <td>Y logico</td>
</tr>

<tr>
    <td>OR</td>
    <td>Logico</td>
    <td>O logico</td>
</tr>

<tr>
    <td>NOT</td>
    <td>Logico</td>
    <td>Negacion</td>
</tr>
</table>


</body>
</html>
